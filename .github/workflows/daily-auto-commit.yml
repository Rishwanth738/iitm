name: Daily Repository Update

on:
  schedule:
    - cron: '30 2 * * *'   # Runs daily at 02:30 UTC (fixed time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Automation Bot"
          git config user.email "23f2002444@ds.study.iitm.ac.in"

      - name: 23f2002444@ds.study.iitm.ac.in - Daily Commit Step
        run: |
          echo "Last update: $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
